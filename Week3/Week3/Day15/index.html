<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App | Glassmorphism</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Link to external CSS (or embed below) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <!-- Search Section -->
        <div class="search">
            <input type="text" id="cityInput" placeholder="Enter city name..." value="London">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error"></div>

        <!-- Current Weather Display -->
        <div id="currentWeather">
            <div class="city" id="cityDisplay">--</div>
            <div class="weather-main">
                <div>
                    <span class="temp" id="tempDisplay">--</span>
                    <span class="condition" id="conditionDisplay">--</span>
                </div>
                <div class="icon" id="iconDisplay"><i class="fas fa-cloud-sun"></i></div>
            </div>
            <div class="details">
                <div class="detail"><i class="fas fa-droplet"></i> <span id="humidityDisplay">--%</span></div>
                <div class="detail"><i class="fas fa-wind"></i> <span id="windDisplay">-- km/h</span></div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div class="forecast-title">5-Day Forecast</div>
        <div class="forecast-container" id="forecast"></div>
    </div>

    <!-- Link to external JavaScript (or embed below) -->
    <script src="script.js"></script>
</body>
</html>
